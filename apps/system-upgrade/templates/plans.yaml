---
# Server (control-plane) nodes must be upgraded before agent nodes.
# This plan targets all control-plane nodes and upgrades them one at a time.
# NOTE: Step through one minor version at a time. Update channel to the next
# minor version only after the cluster is fully healthy on the current version.
# Upgrade path: v1.29 -> v1.30 -> v1.31 -> v1.32 -> v1.33 -> v1.34
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  channel: https://update.k3s.io/v1-release/channels/v1.30
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
  drain:
    force: true
    skipWaitForDeleteTimeout: 60
---
# Agent nodes are upgraded after server nodes complete.
# The prepare step blocks this plan until server-plan has finished.
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: agent-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  cordon: true
  channel: https://update.k3s.io/v1-release/channels/v1.30
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  prepare:
    image: rancher/k3s-upgrade
    args:
      - prepare
      - server-plan
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
  drain:
    force: true
    skipWaitForDeleteTimeout: 60
