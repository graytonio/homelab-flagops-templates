apiVersion: kustomize.config.k8s.io/v1beta1

images:
- name: quay.io/argoproj/argocd
  newTag: v3.3.8

patches:
- path: argocd-repo-server.yaml
- path: argocd-application-controller.yaml
- target:
    group: rbac.authorization.k8s.io
    version: v1
    kind: ClusterRoleBinding
  patch: |-
    - op: replace
      path: /subjects/0/namespace
      value: default
- target:
    kind: Deployment
    labelSelector: "app.kubernetes.io/name=argocd-redis-ha-haproxy"
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ignored
    spec:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1

configMapGenerator:
- name: argocd-cm
  behavior: merge
  literals:
    - "timeout.reconciliation=15s"
- behavior: merge
  literals:
  - kustomize.buildOptions="--enable-alpha-plugins --enable-helm"
  name: argocd-cm
- behavior: merge
  literals:
  - server.insecure="true"
  name: argocd-cmd-params-cm
kind: Kustomization
namespace: argocd
resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/ha/install.yaml
- cmp-plugin.yaml
- ingress.yaml
