apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  annotations:
    argocd-autopilot.argoproj-labs.io/default-dest-server: https://10.0.0.20:6443
    argocd.argoproj.io/sync-options: PruneLast=true
    argocd.argoproj.io/sync-wave: "-5"
  name: staging
  namespace: argocd
spec:
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  description: staging deployments
  destinations:
  - namespace: '*'
    server: 'https://10.0.0.20:6443'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  sourceRepos:
  - '*'
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: staging
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/graytonio/homelab-flagops-templates
        requeueAfterSeconds: 20
        revision: HEAD
        files:
          - path: apps/**/Chart.yaml
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: '{{ .path.basename }}'
        app.kubernetes.io/instance: '{{ .path.basename }}-staging'
      name: '{{ .path.basename }}-staging'
      namespace: argocd
    spec:
      destination:
        namespace: '{{ .path.basename }}'
        server: 'https://10.0.0.20:6443'
      ignoreDifferences:
        - group: argoproj.io
          jsonPointers:
            - /status
          kind: Application
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/conversion/webhook/clientConfig/caBundle
            - /spec/versions/0/selectableFields
            - /spec/versions/1/selectableFields
            - /spec/versions/2/selectableFields
      project: staging
      sources:
        - path: '{{ .path.path }}'
          repoURL: 'https://github.com/graytonio/homelab-flagops-templates'
          plugin:
            name: flagops-plugin-helm
            env:
              - name: FLAGOPS_ENVIRONMENT
                value: staging
              - name: FLAGOPS_PROP_OWNER
                value: graytonw
              - name: FLAGOPS_PROP_CLUSTER
                value: staging
              - name: FLAGOPS_PROP_TYPE
                value: '{{.type}}'
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        automated:
          prune: true
          selfHeal: true
